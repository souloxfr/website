<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>souloxfr Mods</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Space Grotesk',sans-serif;
}
body{
    background:#090909;
    color:white;
    overflow-x:hidden;
}
/* Moving background */
body::before{
    content:"";
    position:fixed;
    inset:-50%;
    background:
    radial-gradient(circle at 30% 30%, rgba(123,124,255,0.18), transparent 25%),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.08), transparent 30%),
    linear-gradient(120deg,#090909,#151515,#090909);
    background-size:200% 200%;
    animation:bgMove 12s ease-in-out infinite;
    z-index:-2;
}
@keyframes bgMove{
    0%{
        transform:translate(-5%, -5%);
        background-position:0% 50%;
    }
    50%{
        transform:translate(5%, 5%);
        background-position:100% 50%;
    }
    100%{
        transform:translate(-5%, -5%);
        background-position:0% 50%;
    }
}
/* Moving grid */
.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:60px 60px;
    mask-image:linear-gradient(to bottom,black,transparent);
    z-index:-1;
    animation:gridMove 10s linear infinite;
}
@keyframes gridMove{
    from{
        background-position:-1000px -1000px;
    }
    to{
        background-position:1000px 1000px;
    }
}
/* Navigation */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:28px 8%;
    border-bottom:1px solid rgba(255,255,255,.08);
}
.logo{
    font-size:24px;
    font-weight:700;
}
.logo span{
    color:#7b7cff;
}
nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}
nav a{
    color:#aaa;
    text-decoration:none;
    transition:.3s;
}
nav a:hover{
    color:white;
}
.gradient{
    background:linear-gradient(90deg,#ffffff,#7b7cff);
    -webkit-background-clip:text;
    color:transparent;
}
.mods-page{
    width:85%;
    margin:80px auto;
}
.mods-title{
    text-align:center;
    margin-bottom:50px;
}
.mods-title h1{
    font-size:60px;
}
.mods-title p{
    color:#999;
    font-size:18px;
    margin-top:15px;
}
.mod-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}
.mod-card{
    background:#111;
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    overflow:hidden;
    transition:.35s;
}
.mod-card:hover{
    transform:translateY(-8px);
    border-color:#7b7cff;
}
.mod-image{
    width:100%;
    height:200px;
    object-fit:cover;
}
.mod-content{
    padding:25px;
}
.mod-content h2{
    margin-bottom:12px;
}
.mod-content p{
    color:#888;
    line-height:1.7;
    margin-bottom:25px;
}
.mod-button{
    display:inline-block;
    padding:12px 25px;
    border-radius:12px;
    background:#7b7cff;
    color:white;
    text-decoration:none;
    transition:.3s;
}
.mod-button:hover{
    box-shadow:0 0 20px rgba(123,124,255,.4);
}
.back{
    text-align:center;
    margin-top:60px;
}
.back a{
    color:#aaa;
    text-decoration:none;
}
.back a:hover{
    color:white;
}
footer{
    text-align:center;
    color:#666;
    padding:45px;
    border-top:1px solid rgba(255,255,255,.08);
}
@media(max-width:700px){
    nav ul{
        display:none;
    }
}
</style>
</head>
<body>
