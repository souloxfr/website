<!DOCTYPE html>

<title>souloxfr Mods</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

.mods-page{

    width:85%;
    margin:80px auto;

}


.mods-title{

    text-align:center;
    margin-bottom:50px;

}


.mods-title h1{

    font-size:60px;

}


.mods-title p{

    color:#999;
    font-size:18px;
    margin-top:15px;

}



.mod-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:30px;

}



.mod-card{

    background:#111;

    border:1px solid rgba(255,255,255,.08);

    border-radius:20px;

    overflow:hidden;

    transition:.35s;

}



.mod-card:hover{

    transform:translateY(-8px);

    border-color:#7b7cff;

}



.mod-image{

    width:100%;

    height:200px;

    object-fit:cover;

}



.mod-content{

    padding:25px;

}



.mod-content h2{

    margin-bottom:12px;

}



.mod-content p{

    color:#888;

    line-height:1.7;

    margin-bottom:25px;

}



.mod-button{

    display:inline-block;

    padding:12px 25px;

    border-radius:12px;

    background:#7b7cff;

    color:white;

    text-decoration:none;

    transition:.3s;

}



.mod-button:hover{

    box-shadow:0 0 20px rgba(123,124,255,.4);

}


.back{

    text-align:center;

    margin-top:60px;

}


.back a{

    color:#aaa;

    text-decoration:none;

}


.back a:hover{

    color:white;

}

</style>

</head>
